# Jekyll configuration
#markdown: redcarpet
#highlighter: pygments
#markdown: kramdown
#highlighter: rouge
#paginate: 5

language: 'en-us'
url: "https://gcartier94.github.io"

# Website info
name: 'Caffeine Meditations'
title: 'Caffeine Meditations'
description: "meditations on complexity, one sip at a time"
author: "Guilherme Cartier"

# Social / SEO
social:
  name: Guilherme Cartier
  links:
    - https://www.linkedin.com/in/gcartier/
    - https://github.com/gcartier94

# RSS Feed
plugins:
  - jekyll-feed
  - jekyll-seo-tag

short_url: 'gcartier94.github.io'
# edit baseurl to simply '/' if using as your personal page (instead of a project page)
baseurl: "/"
theme: jekyll-theme-console


# Permalinks
#permalink: /:title
# permalink: /author/:username
# permalink: /tag/:tag

# Additional settings available on the front-matter
# Site logo in the index.html (as in demo.ghost.io)
# Author's page cover in _layouts/author.html
# The same for page.html and tag.html layouts
# Post's page cover as a per-post basis _posts/...
# Disqus comments as a per-post basis
# ...


# Settings for builing master branch with travis-ci
# with jekyll-travis

# Settings for deploy rake task
# Username and repo of Github repo, e.g.
# https://github.com/USERNAME/REPO.git
# username defaults to ENV['GIT_NAME'] used by Travis
# repo defaults to USERNAME.github.io
# Branch defaults to "source" for USERNAME.github.io
# or "master" otherwise
#safe: false
#lsi: false
#username: gcartier94
#repo: gcartier94.github.io
#branch: master
#destination: _site/
#production_url:  https://gcartier94.github.io/
#source_url:  https://github.com/gcartier94/gcartier94.github.io/
# Example Site settings

header_pages:
  - index.md
  - about.md

#footer: 'follow us on <a href="https://twitter.com/">twitter</a>'

# Theme options
style: light # light (default) or dark
# listen_for_clients_preferred_style: true # true or false (default)

# Fonts
disable_google_fonts: false # set true to prevent loading fonts.googleapis.com


exclude:
  - README.md
  - Rakefile
  - Gemfile
  - Gemfile.lock
  - changelog.md
  - "*.Rmd"
  - vendor
  - .travis.yml
  - node_modules
  - .git
